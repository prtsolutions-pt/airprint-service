version: "3"

services:

  # Container #1: Air Print Server
  airprint:
    image: chuckcharlie/cups-avahi-airprint:latest
    container_name: AirPrint
    volumes:
      # To store configurations
      # In the NAS | In the container
      - /volume1/docker/AirPrint/config:/config
      - /volume1/docker/AirPrint/services:/services
    # Necessary for it to function properly
    network_mode: host
    environment:
      - TZ=Europe/Lisbon
      - PUID=1026
      - PGID=100
      - CUPSADMIN=${CUPSADMIN}
      - CUPSPASSWORD=${CUPSPASSWORD}
    restart: unless-stopped

    # Access the configuration page at
    # http://<NAS IP>:631